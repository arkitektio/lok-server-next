account:
  email_verification: none
  login_by_code_enabled: true
  mfa_trust_enabled: true
  # SPA URLs allauth points users at ({key} is filled in by allauth). Change the host per deployment.
  headless_frontend_urls:
    account_confirm_email: http://localhost/account/verify-email/{key}
    account_reset_password_from_key: http://localhost/account/password/reset/key/{key}
    account_signup: http://localhost/account/signup
  social_provider_apps:
  - allauth.socialaccount.providers.orcid
  - allauth.socialaccount.providers.google

# OIDC/OAuth2 clients provisioned on boot. Provide the client(s), secret(s) and
# redirect_uris per deployment (see the `ensureopenid` command).
openid_apps:
- client_name: Lok Frontend
  client_id: lok-frontend
  client_secret: change-me-per-deployment
  redirect_uris:
  - http://localhost:3000/auth/callback
